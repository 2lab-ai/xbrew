name: Distro smoke

# Validates verified binaries, apt, and dnf on real Linux distros — including
# the public dbotter name on Arch and real install/uninstall cycles.

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  arch:
    name: archlinux (verified binary)
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 25
    steps:
      - name: Install build and assertion tools
        run: pacman -Syu --disable-sandbox --noconfirm git rust cargo jq
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: cargo build --release --locked
      - name: Install dbotter Preview by its public xbrew name
        run: |
          set -euo pipefail
          install -Dm755 target/release/xbrew /usr/local/bin/xbrew
          export PATH="$HOME/.xbrew/bin:$PATH"
          xbrew install dbotter
          identity="$(dbotter version --format json)"
          echo "$identity"
          jq -e '
            .package_version == "0.1.0"
            and .channel == "preview"
            and .source_sha == "5f887198112c46f308c50b6596610afb9720415b"
            and .target == "x86_64-unknown-linux-gnu"
            and .arch == "x86_64"
          ' <<<"$identity"
          xbrew list
          xbrew uninstall dbotter
          test ! -e "$HOME/.xbrew/bin/dbotter"

  ubuntu:
    name: ubuntu (apt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-ubuntu
      - run: cargo build --release --locked
      - name: smoke
        run: |
          set -euo pipefail
          BIN=target/release/xbrew
          "$BIN" --version
          "$BIN" info telegram
          # adopt a package that ships with the image (no network needed)
          "$BIN" install coreutils
          "$BIN" list
          sudo apt-get update -qq
          # real install + uninstall of a tiny package
          "$BIN" install sl
          "$BIN" uninstall sl

  amazonlinux:
    name: amazonlinux 2023 (dnf)
    runs-on: ubuntu-latest
    container: amazonlinux:2023
    timeout-minutes: 25
    steps:
      - name: Install build deps
        run: dnf install -y git tar gzip gcc rust cargo
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: cargo build --release --locked
      - name: smoke
        run: |
          set -euo pipefail
          BIN=target/release/xbrew
          "$BIN" --version
          "$BIN" info telegram
          # running as root in the container -> run_priv skips sudo
          "$BIN" install bash        # preinstalled -> adoption path
          "$BIN" list
          "$BIN" install tree        # real dnf install
          "$BIN" uninstall tree
